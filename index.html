<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PONG ARCADE</title>
  <script>
    function loadPeerJS() {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js';
      s.onerror = () => { const s2 = document.createElement('script'); s2.src = 'https://cdn.jsdelivr.net/npm/peerjs@1.5.1/dist/peerjs.min.js'; document.head.appendChild(s2); };
      document.head.appendChild(s);
    }
    loadPeerJS();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Orbitron',monospace;overflow:hidden}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,.03) 2px,rgba(0,255,180,.03) 4px);pointer-events:none;z-index:100}
    #title{color:#00ffb4;font-size:2.2rem;font-weight:900;letter-spacing:.5em;text-shadow:0 0 20px #00ffb4,0 0 60px #00ffb480;margin-bottom:8px;animation:flicker 4s infinite}
    @keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.6}97%{opacity:1}98%{opacity:.4}99%{opacity:1}}
    #scoreboard{display:flex;gap:80px;margin-bottom:10px;align-items:center}
    .score{font-size:2.5rem;font-weight:700;color:#fff;text-shadow:0 0 15px #00ffb4;min-width:60px;text-align:center;transition:transform .15s}
    .score.pop{transform:scale(1.4)}
    .player-label{font-size:.55rem;letter-spacing:.2em;color:#00ffb480;text-align:center;margin-top:4px}
    #canvas-wrap{position:relative;border:2px solid #00ffb430;box-shadow:0 0 40px #00ffb420,inset 0 0 40px #00ffb408;border-radius:4px}
    canvas{display:block;background:#050f0b;border-radius:2px;touch-action:none;max-width:100%}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);border-radius:2px;gap:12px;transition:opacity .4s;padding:20px;z-index:50}
    #overlay.hidden{opacity:0;pointer-events:none}
    #ov-title{font-size:1.1rem;color:#00ffb4;letter-spacing:.3em;text-shadow:0 0 20px #00ffb4}
    #ov-sub{font-size:.58rem;color:#aaa;letter-spacing:.1em;text-align:center;line-height:2}
    .mode-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .mbtn{padding:10px 16px;background:transparent;border:2px solid #00ffb4;color:#00ffb4;font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;box-shadow:0 0 12px #00ffb430;transition:all .2s;border-radius:2px;display:flex;flex-direction:column;align-items:center;gap:4px}
    .mbtn .ic{font-size:1.3rem}.mbtn .sb{font-size:.42rem;color:#aaa;font-weight:400}
    .mbtn:hover{background:#00ffb4;color:#000;box-shadow:0 0 28px #00ffb4}.mbtn:hover .sb{color:#000}
    #retry-area{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .ctrl-row{display:flex;gap:36px}
    .ctrl{text-align:center;font-size:.48rem;color:#555;letter-spacing:.08em;line-height:2}
    .key{display:inline-block;border:1px solid #333;border-radius:3px;padding:1px 5px;color:#888;font-size:.48rem;background:#111}
    #bottom-btns{display:flex;gap:12px;margin-top:8px}
    .gbtn{padding:7px 20px;background:transparent;border:2px solid #00ffb480;color:#00ffb4;font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;letter-spacing:.12em;cursor:pointer;border-radius:2px;transition:all .2s}
    .gbtn:hover{background:#00ffb430}.gbtn#exit-btn{border-color:#ff4444;color:#ff4444}.gbtn#exit-btn:hover{background:#ff444430}.gbtn.hidden{display:none}
    .mbtn#btn-on:hover{background:#a78bfa;color:#000;box-shadow:0 0 28px #a78bfa}
    #ping-display{font-size:.45rem;color:#444;letter-spacing:.1em;margin-top:2px;text-align:center;min-height:14px}
    #online-status{font-size:.52rem;letter-spacing:.1em;text-align:center;min-height:16px;margin-top:2px}
    #online-status.ok{color:#00ffb4}#online-status.err{color:#ff4444}#online-status.warn{color:#ffe135}
    #room-code-display{font-size:2rem;font-weight:900;color:#00ffb4;letter-spacing:.4em;text-shadow:0 0 30px #00ffb4;text-align:center;padding:8px 16px;border:2px solid #00ffb430;border-radius:4px;background:#00ffb408}
    #code-input{background:#111;border:2px solid #a78bfa;color:#a78bfa;font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;letter-spacing:.4em;text-align:center;padding:8px 16px;border-radius:4px;width:160px;text-transform:uppercase;outline:none;position:relative;z-index:200;pointer-events:all;-webkit-user-select:text;user-select:text;}
  </style>
</head>
<body>
  <div id="title">PONG ARCADE</div>
  <div id="scoreboard">
    <div><div class="score" id="sL">0</div><div class="player-label" id="lbL">PLAYER 1</div></div>
    <div><div class="score" id="sR">0</div><div class="player-label" id="lbR">PLAYER 2</div></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas" width="700" height="560"></canvas>
    <div id="overlay">
      <div id="ov-title">PONG ARCADE</div>
      <div id="ov-sub">Choose your game mode!</div>
      <div class="mode-btns" id="mode-btns">
        <button class="mbtn" id="btn-br"><span class="ic">­¤¦▒</span>SINGLE PLAYER<span class="sb">Break all bricks!</span></button>
        <button class="mbtn" id="btn-ai"><span class="ic">­¤ż¢</span>VS COMPUTER<span class="sb">Beat the AI!</span></button>
        <button class="mbtn" id="btn-mp"><span class="ic">ŌÜĪ</span>MULTIPLAYER<span class="sb">2 Players local!</span></button>
        <button class="mbtn" id="btn-on" style="border-color:#a78bfa;color:#a78bfa;box-shadow:0 0 12px #a78bfa30"><span class="ic">­¤īÉ</span>ONLINE<span class="sb">Play with friends!</span></button>
      </div>
      <div id="ctrl-area"></div>
      <div id="retry-area"></div>
    </div>
  </div>
  <div id="bottom-btns">
    <button class="gbtn hidden" id="pause-btn">ŌÅĖ PAUSE</button>
    <button class="gbtn hidden" id="menu-btn">­¤ÅĀ MENU</button>
    <button class="gbtn hidden" id="exit-btn">Ō£¢ EXIT</button>
  </div>
  <div id="ping-display"></div>

  <script>
    const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const ovTitle=document.getElementById('ov-title'),ovSub=document.getElementById('ov-sub');
    const modeBtns=document.getElementById('mode-btns'),ctrlArea=document.getElementById('ctrl-area'),retryArea=document.getElementById('retry-area');
    const pauseBtn=document.getElementById('pause-btn'),menuBtn=document.getElementById('menu-btn'),exitBtn=document.getElementById('exit-btn');
    const sLEl=document.getElementById('sL'),sREl=document.getElementById('sR');
    const lbL=document.getElementById('lbL'),lbR=document.getElementById('lbR');

    // ŌöĆŌöĆ AUDIO ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    const AC=new(window.AudioContext||window.webkitAudioContext)();
    function mkRev(){const n=AC.sampleRate*.3,b=AC.createBuffer(2,n,AC.sampleRate);for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);}const v=AC.createConvolver();v.buffer=b;return v;}
    const rev=mkRev(),rg=AC.createGain();rg.gain.value=.15;rev.connect(rg);rg.connect(AC.destination);
    function ao(n){n.connect(AC.destination);n.connect(rev);}
    function tone(f,tp,d,v,fe){try{const o=AC.createOscillator(),g=AC.createGain();o.type=tp;o.frequency.setValueAtTime(f,AC.currentTime);if(fe)o.frequency.exponentialRampToValueAtTime(fe,AC.currentTime+d);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);ao(g);o.start();o.stop(AC.currentTime+d+.05);}catch(e){}}
    const sPad=()=>{tone(200,'sine',.09,.3);tone(1200,'square',.04,.07);};
    const sWall=()=>{try{const t=AC.currentTime,n=AC.sampleRate*.05,b=AC.createBuffer(1,n,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,3);const s=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain();s.buffer=b;f.type='bandpass';f.frequency.value=300;g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);s.connect(f);f.connect(g);ao(g);s.start();}catch(e){}};
    const sScore=()=>{[300,400,500].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.12,.22),i*100));};
    const sWin=()=>{[523,659,784,659,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.3,.32),i*150));};
    const sCd=()=>tone(440,'sine',.18,.2);
    const sGo=()=>tone(300,'sawtooth',.25,.28,1400);
    const sBrick=()=>tone(380,'square',.07,.18,120);

    // ŌöĆŌöĆ CONSTANTS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    const PH=80,PS=6,BS=10,WIN=7;
    const PPH=12,PPS=7;
    const BR=5,BC=10,BW=58,BH=18,BP=4;
    const BCOLS=['#ff6b6b','#ff9f43','#ffe135','#00ffb4','#35d4ff'];

    // ŌöĆŌöĆ STATE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    let mode=null,running=false,paused=false,countdown=0,cdTimer=null,keys={};
    let lp,rp,ball,sL=0,sR=0,lives=3;
    let bricks=[];
    let getReadyMsg='';

    // ŌöĆŌöĆ BREAKOUT POWER-UPS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    let brkPUs=[];
    let brkPUcount=0; // total powerups spawned this game (persists across lives, resets only on new game)
    let brkShield=false,brkShieldTimer=null;
    let extraBalls=[];
    const BRK_PU_TYPES=[
      {type:'shield',   emoji:'­¤øĪ’ĖÅ',color:'#35d4ff',label:'SHIELD'},
      {type:'dball',    emoji:'ŌÜĮ',color:'#ffe135',label:'DOUBLE BALL'},
      {type:'extralife',emoji:'ŌØż’ĖÅ', color:'#ff6b6b',label:'EXTRA LIFE'},
      {type:'death',    emoji:'­¤ÆĆ',color:'#ff4444',label:'DANGER!'},
    ];
    function spawnBrkPU(x,y){
      // hard cap: no more than 15 powerups per round
      if(brkPUcount>=15)return; // hard cap: max 15 across entire game, count never resets on life loss
      // weighted per brick: shield 1%, dball 5%, extralife 5%, death 5%, nothing 84%
      const r=Math.random();
      if(r<0.01){brkPUs.push({x,y,vy:2.5,w:28,h:28,pulse:0,...BRK_PU_TYPES[0]});brkPUcount++;}
      else if(r<0.06){brkPUs.push({x,y,vy:2.5,w:28,h:28,pulse:0,...BRK_PU_TYPES[1]});brkPUcount++;}
      else if(r<0.11){brkPUs.push({x,y,vy:2.5,w:28,h:28,pulse:0,...BRK_PU_TYPES[2]});brkPUcount++;}
      else if(r<0.16){brkPUs.push({x,y,vy:2.5,w:28,h:28,pulse:0,...BRK_PU_TYPES[3]});brkPUcount++;}
    }
    function resetBrkPUs(){brkPUs=[];extraBalls=[];brkShield=false;brkPUcount=0;if(brkShieldTimer){clearTimeout(brkShieldTimer);brkShieldTimer=null;}}

    // ŌöĆŌöĆ ONLINE STATE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    let peer=null,conn=null,isHost=false,onlinePingStart=0,onlinePingMs=0;
    let onlineMyPad ={x:0,y:H-6-PPH,w:W,h:PPH,ax:W/2};
    let onlineOpPad ={x:0,y:6,      w:W,h:PPH,ax:W/2};
    let onlinePaused=false;
    let onlineRoleFlash=0;
    const pingDisplay=document.getElementById('ping-display');

    function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
    function animPop(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),200);}
    function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}

    function initBall(spd){
      const s=spd||7,angle=(Math.random()*40-20)*Math.PI/180,dir=Math.random()<.5?1:-1;
      if(mode==='ai'||mode==='multi'){ball={x:W/2,y:H/2,vx:Math.sin(angle)*s,vy:Math.cos(angle)*s*dir,size:BS,trail:[]};}
      else{ball={x:W/2,y:H/2,vx:Math.cos(angle)*s*dir,vy:Math.sin(angle)*s,size:BS,trail:[]};}
    }
    const ZONE=50;
    function initPads(){
      lp={x:0,y:6,       w:W,h:PPH,ax:W/2,frozen:false};
      rp={x:0,y:H-6-PPH, w:W,h:PPH,ax:W/2,frozen:false};
    }
    function makeBricks(){
      bricks=[];
      const tw=BC*(BW+BP)-BP,sx=(W-tw)/2;
      for(let r=0;r<BR;r++)for(let c=0;c<BC;c++)
        bricks.push({x:sx+c*(BW+BP),y:60+r*(BH+BP),w:BW,h:BH,color:BCOLS[r%BCOLS.length],alive:true,hp:r<2?2:1});
    }

    // ŌöĆŌöĆ COUNTDOWN ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    function startCd(cb){
      running=false;countdown=3;
      if(cdTimer)clearInterval(cdTimer);
      cdTimer=setInterval(()=>{
        if(paused)return;countdown--;
        if(countdown<=0){clearInterval(cdTimer);cdTimer=null;countdown=0;running=true;sGo();if(cb)cb();}
        else sCd();
      },1000);
    }

    // ŌöĆŌöĆ RESULTS / MENU ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    function showResult(title,sub,btnTxt,cb){
      running=false;ovTitle.textContent=title;ovSub.innerHTML=sub;
      modeBtns.style.display='none';ctrlArea.innerHTML='';retryArea.innerHTML='';
      const b1=document.createElement('button');b1.className='mbtn';b1.textContent=btnTxt;b1.onclick=cb;
      const b2=document.createElement('button');b2.className='mbtn';b2.style.borderColor='#555';b2.style.color='#aaa';b2.textContent='­¤ÅĀ MENU';b2.onclick=showMenu;
      retryArea.appendChild(b1);retryArea.appendChild(b2);
      document.getElementById('overlay').classList.remove('hidden');
    }
    function showMenu(){
      running=false;paused=false;mode=null;onlinePaused=false;
      clearInterval(cdTimer);cdTimer=null;countdown=0;
      if(conn){try{conn.close();}catch(e){}conn=null;}
      if(peer){try{peer.destroy();}catch(e){}peer=null;}
      pingDisplay.textContent='';
      pauseBtn.classList.add('hidden');menuBtn.classList.add('hidden');exitBtn.classList.add('hidden');
      pauseBtn.textContent='ŌÅĖ PAUSE';
      ovTitle.textContent='PONG ARCADE';ovSub.textContent='Choose your game mode!';
      modeBtns.style.display='';ctrlArea.innerHTML='';retryArea.innerHTML='';
      document.getElementById('overlay').classList.remove('hidden');
    }

    // ŌöĆŌöĆ ONLINE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ

    function onlineInitPeer(id,cb){

      setOnlineStatus('Connecting to network...','warn');
      peer=new Peer(id,{debug:0});
      peer.on('open',cb);
      peer.on('error',e=>setOnlineStatus('ŌØī Error: '+e.type+'. Try refreshing.','err'));
    }

      retryArea.innerHTML=`

      document.getElementById('ob-copy').onclick=()=>{
        const btn=document.getElementById('ob-copy');
        try{
          if(navigator.clipboard&&window.isSecureContext)
            navigator.clipboard.writeText(code).then(()=>{btn.querySelector('.ic').textContent='Ō£ģ';setTimeout(()=>{if(btn)btn.querySelector('.ic').textContent='­¤ōŗ';},2000);});
          else{const t=document.createElement('input');t.value=code;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);btn.querySelector('.ic').textContent='Ō£ģ';setTimeout(()=>{if(btn)btn.querySelector('.ic').textContent='­¤ōŗ';},2000);}
        }catch(e){alert('Your code is: '+code);}
      };
      onlineInitPeer('pong-room-'+code,()=>{
        setOnlineStatus('Ō£ō Room ready! Waiting for friend...','ok');
        peer.on('connection',c=>{
          conn=c;
          conn.on('open',()=>{
            mode='online';onlineSetupConn();
            setOnlineStatus('­¤Ä« Friend connected! Starting...','ok');
            pauseBtn.classList.remove('hidden');menuBtn.classList.remove('hidden');exitBtn.classList.remove('hidden');

      lbL.textContent='YOU (GUEST)';lbR.textContent='OPPONENT';
      retryArea.innerHTML=`
        <div style="color:#aaa;font-size:.5rem;letter-spacing:.1em;text-align:center">Enter your friend's 4-digit code:</div>
        <input id="code-input" type="number" min="1000" max="9999" placeholder="1234" style="background:#111;border:2px solid #a78bfa;color:#a78bfa;font-family:Orbitron,monospace;font-size:1.4rem;font-weight:700;letter-spacing:.3em;text-align:center;padding:8px 16px;border-radius:4px;width:170px;outline:none;-moz-appearance:textfield;position:relative;z-index:999;pointer-events:all;touch-action:auto;-webkit-user-select:text;user-select:text;cursor:text"/>

      setTimeout(()=>{const inp=document.getElementById('code-input');if(inp)inp.focus();},100);

      document.getElementById('ob-connect').onclick=()=>{
        const code=String(document.getElementById('code-input').value).trim();
        if(code.length!==4||isNaN(Number(code))){setOnlineStatus('ŌØī Enter a valid 4-digit code!','err');return;}

          conn=peer.connect('pong-room-'+code,{reliable:true});

          conn.on('open',()=>{
            mode='online';onlineSetupConn();
            setOnlineStatus('­¤Ä« Connected! Starting...','ok');
            onlineMyPad ={x:0,y:H-6-PPH,w:W,h:PPH,ax:W/2};
            onlineOpPad ={x:0,y:6,       w:W,h:PPH,ax:W/2};

          setTimeout(()=>{if(conn&&!conn.open)setOnlineStatus('ŌØī Timed out. Is the code correct?','err');},10000);

    function onlineSetupConn(){
      conn.on('data',onlineData);
      conn.on('close',()=>{
        running=false;
        document.getElementById('overlay').classList.remove('hidden');
        ovTitle.textContent='­¤śó DISCONNECTED';
        ovSub.innerHTML='<span style="color:#ff4444">Opponent left the game.</span>';
        retryArea.innerHTML='<button class="mbtn" onclick="showMenu()">­¤ÅĀ BACK TO MENU</button>';
        modeBtns.style.display='none';
      });
      setInterval(()=>{if(conn&&conn.open){onlinePingStart=Date.now();onlineSend({t:'pi'});}},2000);
    }

    function onlineSend(data){if(conn&&conn.open)conn.send(data);}

    function onlineData(d){
      if(d.t==='pi'){onlineSend({t:'po'});return;}
      if(d.t==='po'){onlinePingMs=Date.now()-onlinePingStart;pingDisplay.textContent='Ping: '+onlinePingMs+'ms';return;}
      if(d.t==='guestReady'&&isHost){setOnlineStatus('­¤Ä« Friend ready! Starting...','ok');return;}
      if(d.t==='pauseReq'&&isHost){togglePause();return;}
      if(d.t==='pause'&&!isHost){applyOnlinePause(d.p);return;}
      if(!isHost){
        if(d.t==='s'){
          ball={x:d.bx,y:d.by,vx:d.vx,vy:d.vy,size:BS,trail:d.tr||[]};
          onlineOpPad.ax=d.myAx;
          sL=d.sGuest;sR=d.sHost;
          sLEl.textContent=sL;sREl.textContent=sR;
          if(!paused){running=d.r;countdown=d.cd;}
        }
        if(d.t==='w'){
          running=false;sWin();
          if(d.sH!==undefined){sR=d.sH;sREl.textContent=sR;}
          if(d.sG!==undefined){sL=d.sG;sLEl.textContent=sL;}
          onlineShowResult(d.w==='host'?'OPPONENT WINS!':'­¤Äē YOU WIN!');
        }
        if(d.t==='cd'){if(!paused)countdown=d.cd;}
        if(d.t==='reset'){
          ball={x:W/2,y:H/2,vx:0,vy:0,size:BS,trail:[]};
          running=false;countdown=3;paused=false;onlinePaused=false;
          onlineRoleFlash=120;
          pauseBtn.textContent='ŌÅĖ PAUSE';
          document.getElementById('overlay').classList.add('hidden');
        }
      }else{
        if(d.t==='p'){onlineOpPad.ax=d.ax;}
      }
    }

    function onlineStartGame(){
      sL=0;sR=0;sLEl.textContent=0;sREl.textContent=0;
      onlineMyPad ={x:0,y:H-6-PPH,w:W,h:PPH,ax:W/2};
      onlineOpPad ={x:0,y:6,       w:W,h:PPH,ax:W/2};
      ball={x:W/2,y:H/2,vx:0,vy:0,size:BS,trail:[]};
      running=false;countdown=0;paused=false;onlinePaused=false;
      pauseBtn.textContent='ŌÅĖ PAUSE';
      onlineRoleFlash=180;
      if(isHost)onlineResetBall();
    }

    function onlineResetBall(){
      running=false;
      onlineSend({t:'reset'});
      const angle=(Math.random()*40-20)*Math.PI/180,dir=Math.random()<.5?1:-1,spd=7;
      ball={x:W/2,y:H/2,vx:Math.sin(angle)*spd,vy:Math.cos(angle)*spd*dir,size:BS,trail:[]};
      countdown=3;
      onlineSend({t:'cd',cd:3});
      if(cdTimer)clearInterval(cdTimer);
      cdTimer=setInterval(()=>{
        if(paused)return;countdown--;
        onlineSend({t:'cd',cd:countdown});
        if(countdown<=0){clearInterval(cdTimer);cdTimer=null;countdown=0;running=true;sGo();}
        else sCd();
      },1000);
    }

    function onlineUpdateHost(){
      onlineSend({
        t:'s',
        bx:ball.x,by:ball.y,vx:ball.vx,vy:ball.vy,tr:ball.trail,
        myAx:onlineMyPad.ax,
        sHost:sR,
        sGuest:sL,
        r:running&&!paused,
        cd:countdown
      });
      if(!running||paused)return;
      ball.trail.push({x:ball.x,y:ball.y});
      if(ball.trail.length>10)ball.trail.shift();
      ball.x+=ball.vx;ball.y+=ball.vy;
      if(ball.x-ball.size/2<=0){ball.x=ball.size/2;ball.vx*=-1;sWall();}
      if(ball.x+ball.size/2>=W){ball.x=W-ball.size/2;ball.vx*=-1;sWall();}
      const br=ball.size/2;
      const topPadBottom=onlineOpPad.y+onlineOpPad.h;
      const botPadTop=onlineMyPad.y;
      const prevY=ball.y-ball.vy;
      if(ball.vy<0){
        if(prevY-br>=topPadBottom&&ball.y-br<=topPadBottom){
          if(ball.x>onlineOpPad.ax-ZONE&&ball.x<onlineOpPad.ax+ZONE){
            const rel=(ball.x-onlineOpPad.ax)/ZONE,ang=rel*65*Math.PI/180;
            const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.05,14);
            ball.y=topPadBottom+br;
            ball.vx=Math.sin(ang)*spd;ball.vy=Math.abs(Math.cos(ang)*spd);sPad();
          }
        }
      }
      if(ball.vy>0){
        if(prevY+br<=botPadTop&&ball.y+br>=botPadTop){
          if(ball.x>onlineMyPad.ax-ZONE&&ball.x<onlineMyPad.ax+ZONE){
            const rel=(ball.x-onlineMyPad.ax)/ZONE,ang=rel*65*Math.PI/180;
            const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.05,14);
            ball.y=botPadTop-br;
            ball.vx=Math.sin(ang)*spd;ball.vy=-Math.abs(Math.cos(ang)*spd);sPad();
          }
        }
      }
      if(ball.y<-20){
        sR++;sREl.textContent=sR;animPop(sREl);sScore();
        if(sR>=WIN){onlineSend({t:'w',w:'host',sH:sR,sG:sL});onlineShowResult('­¤Äē YOU WIN!');}
        else{running=false;setTimeout(onlineResetBall,800);}
      }
      if(ball.y>H+20){
        sL++;sLEl.textContent=sL;animPop(sLEl);sScore();
        if(sL>=WIN){onlineSend({t:'w',w:'guest',sH:sR,sG:sL});onlineShowResult('OPPONENT WINS!');}
        else{running=false;setTimeout(onlineResetBall,800);}
      }
    }

    function drawOnline(){
      ctx.clearRect(0,0,W,H);
      const fy=isHost?(y=>y):(y=>H-y);
      ctx.setLineDash([8,12]);ctx.strokeStyle='#00ffb420';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
      ctx.font='bold 11px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#ff6b6b25';ctx.fillText('Ō¢▓ OPPONENT ZONE Ō¢▓',W/2,H/4);
      ctx.fillStyle='#00ffb425';ctx.fillText('Ō¢╝ YOUR ZONE Ō¢╝',W/2,H*3/4);
      ball.trail.forEach((pt,i)=>{
        const a=(i/ball.trail.length)*.4,r=BS*(i/ball.trail.length)*.8;
        ctx.beginPath();ctx.arc(pt.x,fy(pt.y),r,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,255,180,${a})`;ctx.fill();
      });
      if(running||countdown>0){
        ctx.beginPath();ctx.arc(ball.x,fy(ball.y),BS/2,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.shadowColor='#00ffb4';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
      }
      const myVisY=H-6-PPH;
      ctx.fillStyle='#ffffff10';rr(0,myVisY,W,PPH,3);ctx.fill();
      ctx.fillStyle='#00ffb4';ctx.shadowColor='#00ffb4';ctx.shadowBlur=14;
      rr(onlineMyPad.ax-ZONE,myVisY,ZONE*2,PPH,5);ctx.fill();ctx.shadowBlur=0;
      ctx.font='bold 8px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillStyle='#00ffb4cc';ctx.fillText('Ō¢╝ YOU',onlineMyPad.ax,myVisY-2);
      const opVisY=6;
      ctx.fillStyle='#ffffff10';rr(0,opVisY,W,PPH,3);ctx.fill();
      ctx.fillStyle='#ff6b6b';ctx.shadowColor='#ff6b6b';ctx.shadowBlur=14;
      rr(onlineOpPad.ax-ZONE,opVisY,ZONE*2,PPH,5);ctx.fill();ctx.shadowBlur=0;
      ctx.font='7px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillStyle='#ff6b6b80';ctx.fillText('OPPONENT',onlineOpPad.ax,opVisY-2);
      if(countdown>0){
        ctx.font='bold 100px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#00ffb4';ctx.shadowColor='#00ffb4';ctx.shadowBlur=30;
        ctx.fillText(countdown,W/2,H/2);ctx.shadowBlur=0;
      }
      if(!isHost&&!running&&countdown===0&&ball.vx===0&&ball.vy===0){
        ctx.font='14px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#ffffff50';ctx.fillText('Waiting for host to start...',W/2,H/2+30);
      }
      if(onlinePingMs>0){
        ctx.font='9px monospace';ctx.textAlign='right';ctx.textBaseline='top';
        ctx.fillStyle=onlinePingMs<100?'#00ffb460':'#ff443380';
        ctx.fillText('ping '+onlinePingMs+'ms',W-6,6);
      }
      if(onlineRoleFlash>0){
        onlineRoleFlash--;
        const alpha=Math.min(1,onlineRoleFlash/30);
        ctx.font='bold 13px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle=`rgba(0,255,180,${alpha})`;
        ctx.shadowColor='#00ffb4';ctx.shadowBlur=20*alpha;
        ctx.fillText('Ō¢╝ YOUR PADDLE ŌĆö MOVE ME! Ō¢╝',W/2,myVisY-22);
        ctx.shadowBlur=0;
      }
      if(paused)drawPaused();
    }

    function update(){
      if(mode==='online'){
        if(keys['ArrowLeft']||keys['a']||keys['A']){
          onlineMyPad.ax=Math.max(ZONE,onlineMyPad.ax-PPS);
          onlineSend({t:'p',ax:onlineMyPad.ax});
        }
        if(keys['ArrowRight']||keys['d']||keys['D']){
          onlineMyPad.ax=Math.min(W-ZONE,onlineMyPad.ax+PPS);
          onlineSend({t:'p',ax:onlineMyPad.ax});
        }
        if(isHost)onlineUpdateHost();
        return;
      }
      if(!running||paused)return;
      if(mode==='breakout')updBreakout();
      else if(mode==='ai')updAI();
      else if(mode==='multi')updMulti();
    }

    function moveBall(){ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>12)ball.trail.shift();ball.x+=ball.vx;ball.y+=ball.vy;}
    function wallBounce(){
      if(mode==='ai'||mode==='multi'){
        if(ball.x-ball.size/2<=0){ball.x=ball.size/2;ball.vx*=-1;sWall();}
        if(ball.x+ball.size/2>=W){ball.x=W-ball.size/2;ball.vx*=-1;sWall();}
      }else{
        if(ball.x-ball.size/2<=0){ball.x=ball.size/2;ball.vx*=-1;sWall();}
        if(ball.x+ball.size/2>=W){ball.x=W-ball.size/2;ball.vx*=-1;sWall();}
        if(ball.y-ball.size/2<=0){ball.y=ball.size/2;ball.vy*=-1;sWall();}
      }
    }
    function padBounceTB(p,side){
      if(side==='top'   &&!(ball.y-ball.size/2<=p.y+p.h&&ball.vy<0))return;
      if(side==='bottom'&&!(ball.y+ball.size/2>=p.y    &&ball.vy>0))return;
      if(ball.x<p.ax-ZONE||ball.x>p.ax+ZONE)return;
      const rel=(ball.x-p.ax)/ZONE,ang=rel*65*Math.PI/180;
      const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.05,14);
      if(side==='top'){ball.y=p.y+p.h+ball.size/2;ball.vx=Math.sin(ang)*spd;ball.vy=Math.abs(Math.cos(ang)*spd);}
      else{ball.y=p.y-ball.size/2;ball.vx=Math.sin(ang)*spd;ball.vy=-Math.abs(Math.cos(ang)*spd);}
      sPad();
    }

    function brkBallBounce(bl,p){
      // bounce a single ball object off the breakout paddle
      if(bl.vy>0&&bl.y+bl.size/2>=p.y&&bl.y-bl.size/2<=p.y+p.h&&bl.x>=p.x&&bl.x<=p.x+p.w){
        bl.y=p.y-bl.size/2;const rel=(bl.x-(p.x+p.w/2))/(p.w/2),ang=rel*60*Math.PI/180;
        const spd=Math.min(Math.hypot(bl.vx,bl.vy)*1.02,12);bl.vx=Math.sin(ang)*spd;bl.vy=-Math.cos(ang)*spd;sPad();
      }
    }
    function brkBallWalls(bl){
      if(bl.x-bl.size/2<=0){bl.x=bl.size/2;bl.vx*=-1;sWall();}
      if(bl.x+bl.size/2>=W){bl.x=W-bl.size/2;bl.vx*=-1;sWall();}
      if(bl.y-bl.size/2<=0){bl.y=bl.size/2;bl.vy*=-1;sWall();}
    }
    function brkBallBricks(bl){
      for(const b of bricks){
        if(!b.alive)continue;
        if(bl.x+bl.size/2>b.x&&bl.x-bl.size/2<b.x+b.w&&bl.y+bl.size/2>b.y&&bl.y-bl.size/2<b.y+b.h){
          b.hp--;if(b.hp<=0){b.alive=false;spawnBrkPU(b.x+b.w/2,b.y+b.h);}
          const oL=bl.x+bl.size/2-b.x,oR=b.x+b.w-(bl.x-bl.size/2);
          const oT=bl.y+bl.size/2-b.y,oB=b.y+b.h-(bl.y-bl.size/2);
          if(Math.min(oL,oR)<Math.min(oT,oB))bl.vx*=-1;else bl.vy*=-1;
          sL+=(b.hp<=0?10:5);sLEl.textContent=sL;sBrick();return true;
        }
      }
      return false;
    }
    function updBreakout(){
      const p=lp;
      if(keys['ArrowLeft']||keys['a']||keys['A'])p.x-=PS+1;
      if(keys['ArrowRight']||keys['d']||keys['D'])p.x+=PS+1;
      p.x=Math.max(0,Math.min(W-p.w,p.x));

      // move main ball
      moveBall();
      brkBallWalls(ball);
      brkBallBounce(ball,p);

      // move extra balls (double ball powerup) ŌĆö same colour as main ball
      for(let i=extraBalls.length-1;i>=0;i--){
        const eb=extraBalls[i];
        eb.trail.push({x:eb.x,y:eb.y});if(eb.trail.length>10)eb.trail.shift();
        eb.x+=eb.vx;eb.y+=eb.vy;
        brkBallWalls(eb);
        brkBallBounce(eb,p);
        brkBallBricks(eb);
        if(eb.y>H+20){
          extraBalls.splice(i,1);
          // if main ball also gone, lose a life
          if(ball.y>H+20&&extraBalls.length===0){
            loseBrkLife(p);return;
          }
        }
      }

      // update falling powerup tokens
      for(let i=brkPUs.length-1;i>=0;i--){
        const pu=brkPUs[i];
        pu.pulse=(pu.pulse||0)+.1;
        pu.y+=pu.vy;
        // caught by paddle?
        if(pu.x+pu.w/2>p.x&&pu.x-pu.w/2<p.x+p.w&&pu.y+pu.h/2>p.y&&pu.y-pu.h/2<p.y+p.h){
          if(pu.type==='shield'){
            brkShield=true;
            if(brkShieldTimer)clearTimeout(brkShieldTimer);
            brkShieldTimer=setTimeout(()=>{brkShield=false;brkShieldTimer=null;},5000);
          }else if(pu.type==='dball'){
            // spawn extra ball from paddle centre
            extraBalls.push({x:p.x+p.w/2,y:p.y-8,vx:(Math.random()-0.5)*6,vy:-6,size:BS,trail:[]});
          }else if(pu.type==='extralife'){
            lives=Math.min(lives+1,5);
            sREl.textContent='ŌØż’ĖÅ'.repeat(lives);
          }else if(pu.type==='death'){
            brkPUs.splice(i,1);
            loseBrkLife(p);return;
          }
          brkPUs.splice(i,1);
          continue;
        }
        if(pu.y>H+40)brkPUs.splice(i,1);
      }

      // main ball lost ŌĆö only lose life if no extra balls remain
      if(ball.y>H+20){
        if(brkShield){
          ball.y=H-20;ball.vy=-Math.abs(ball.vy);
          brkShield=false;if(brkShieldTimer){clearTimeout(brkShieldTimer);brkShieldTimer=null;}
        }else if(extraBalls.length>0){
          // still have extra balls alive ŌĆö swap one to become the main ball
          const eb=extraBalls.pop();
          ball.x=eb.x;ball.y=eb.y;ball.vx=eb.vx;ball.vy=eb.vy;ball.trail=eb.trail;
        }else{
          loseBrkLife(p);return;
        }
      }

      brkBallBricks(ball);
      if(bricks.filter(b=>b.alive).length===0){sWin();showResult('­¤Äē YOU WIN!','All bricks cleared!<br>Score: <span style="color:#00ffb4">'+sL+'</span>','Ō¢Č PLAY AGAIN',startBreakout);}
    }

    function loseBrkLife(p){
      lives--;sREl.textContent=lives>0?'ŌØż’ĖÅ'.repeat(lives):'­¤ÆĆ';
      extraBalls=[];brkPUs=[];brkShield=false;
      if(brkShieldTimer){clearTimeout(brkShieldTimer);brkShieldTimer=null;}
      if(lives<=0){sWin();showResult('GAME OVER!','Score: <span style="color:#00ffb4">'+sL+'</span>','Ō¢Č TRY AGAIN',startBreakout);}
      else{
        running=false;let readyCd=2;getReadyMsg='GET READY!';
        const readyTimer=setInterval(()=>{
          if(paused)return;readyCd--;
          if(readyCd<=0){clearInterval(readyTimer);getReadyMsg='';ball={x:lp.x+lp.w/2,y:lp.y-20,vx:3.5*(Math.random()<.5?1:-1),vy:-6,size:BS,trail:[]};running=true;}
          else getReadyMsg='GET READY! '+readyCd;
        },1000);
        ball={x:W/2,y:H/2,vx:0,vy:0,size:BS,trail:[]};
      }
    }
    function updAI(){
      if(!rp.frozen){if(keys['ArrowLeft']||keys['a']||keys['A'])rp.ax-=PPS;if(keys['ArrowRight']||keys['d']||keys['D'])rp.ax+=PPS;}
      rp.ax=Math.max(ZONE,Math.min(W-ZONE,rp.ax));
      const diff=ball.x-lp.ax,aiSpd=Math.min(Math.abs(diff),PPS*.78);
      if(Math.abs(diff)>10&&!lp.frozen)lp.ax+=diff>0?aiSpd:-aiSpd;
      lp.ax=Math.max(ZONE,Math.min(W-ZONE,lp.ax));
      moveBall();wallBounce();padBounceTB(lp,'top');padBounceTB(rp,'bottom');checkScore();
    }
    function updMulti(){
      if(!lp.frozen){if(keys['a']||keys['A'])lp.ax-=PPS;if(keys['d']||keys['D'])lp.ax+=PPS;}
      if(!rp.frozen){if(keys['ArrowLeft'])rp.ax-=PPS;if(keys['ArrowRight'])rp.ax+=PPS;}
      lp.ax=Math.max(ZONE,Math.min(W-ZONE,lp.ax));rp.ax=Math.max(ZONE,Math.min(W-ZONE,rp.ax));
      moveBall();wallBounce();padBounceTB(lp,'top');padBounceTB(rp,'bottom');checkScore();
    }
    function checkScore(){
      if(mode==='ai'||mode==='multi'){
        if(ball.y<-20){sR++;sREl.textContent=sR;animPop(sREl);sScore();if(sR>=WIN)endGame('bottom');else{running=false;setTimeout(()=>{initBall();startCd();},800);}}
        if(ball.y>H+20){sL++;sLEl.textContent=sL;animPop(sLEl);sScore();if(sL>=WIN)endGame('top');else{running=false;setTimeout(()=>{initBall();startCd();},800);}}
      }
    }
    function endGame(side){
      running=false;sWin();
      let w;if(mode==='ai')w=side==='top'?'COMPUTER':'PLAYER';else w=side==='top'?'PLAYER 1':'PLAYER 2';
      const restart=mode==='ai'?startAI:startMulti;
      showResult(w+' WINS!','<span style="color:#00ffb4">Congratulations!</span>','Ō¢Č PLAY AGAIN',restart);
    }

    function draw(){
      ctx.clearRect(0,0,W,H);
      if(mode==='online'){drawOnline();return;}
      if(mode==='breakout')drawBreakout();else if(mode)drawPong();
      if(countdown>0&&!paused)drawCd();drawGetReady();if(paused)drawPaused();
    }
    function drawBall(){
      ball.trail.forEach((pt,i)=>{const a=(i/ball.trail.length)*.4,r=ball.size*(i/ball.trail.length)*.8;ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle=`rgba(0,255,180,${a})`;ctx.fill();});
      ctx.beginPath();ctx.arc(ball.x,ball.y,ball.size/2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor='#00ffb4';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
    }
    function drawPad(p){
      if(mode==='ai'||mode==='multi'){
        ctx.fillStyle='#ffffff18';rr(p.x,p.y,p.w,p.h,3);ctx.fill();
        ctx.fillStyle='#fff';ctx.shadowColor='#00ffb4';ctx.shadowBlur=16;
        rr(p.ax-ZONE,p.y,ZONE*2,p.h,5);ctx.fill();ctx.shadowBlur=0;
      }else{
        ctx.fillStyle='#fff';ctx.shadowColor='#00ffb4';ctx.shadowBlur=12;rr(p.x,p.y,p.w,p.h,5);ctx.fill();ctx.shadowBlur=0;
      }
    }
    function drawPong(){
      ctx.setLineDash([8,12]);ctx.strokeStyle='#00ffb420';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
      ctx.font='9px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#00ffb425';
      ctx.fillText(mode==='ai'?'COMPUTER':'PLAYER 1',W/2,H/4+10);ctx.fillText(mode==='ai'?'PLAYER':'PLAYER 2',W/2,H*3/4-10);
      drawBall();drawPad(lp);drawPad(rp);
    }
    function drawBreakout(){
      bricks.forEach(b=>{
        if(!b.alive)return;ctx.fillStyle=b.hp>1?b.color:b.color+'88';ctx.shadowColor=b.color;ctx.shadowBlur=5;ctx.fillRect(b.x,b.y,b.w,b.h);
        ctx.strokeStyle='#00000050';ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;
        if(b.hp>1){ctx.fillStyle='#fff8';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Ōśģ',b.x+b.w/2,b.y+b.h/2);}
      });
      // draw extra balls ŌĆö same colour as main ball
      extraBalls.forEach(eb=>{
        eb.trail.forEach((pt,i)=>{const a=(i/eb.trail.length)*.4,r=eb.size*(i/eb.trail.length)*.8;ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle=`rgba(0,255,180,${a})`;ctx.fill();});
        ctx.beginPath();ctx.arc(eb.x,eb.y,eb.size/2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor='#00ffb4';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
      });
      drawBall();
      // draw paddle (blue glow if shield active)
      const p=lp;
      ctx.fillStyle='#fff';
      ctx.shadowColor=brkShield?'#35d4ff':'#00ffb4';
      ctx.shadowBlur=brkShield?20:14;
      rr(p.x,p.y,p.w,p.h,5);ctx.fill();ctx.shadowBlur=0;
      if(brkShield){
        // shield bar above paddle
        ctx.strokeStyle='#35d4ff';ctx.lineWidth=3;ctx.shadowColor='#35d4ff';ctx.shadowBlur=10;
        ctx.strokeRect(p.x,p.y-4,p.w,2);ctx.shadowBlur=0;
        ctx.font='8px Orbitron,monospace';ctx.fillStyle='#35d4ff';ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText('­¤øĪ’ĖÅ SHIELD',p.x+p.w/2,p.y-6);
      }
      // draw falling powerup tokens
      brkPUs.forEach(pu=>{
        const s=pu.w/2+Math.sin(pu.pulse)*2;
        ctx.beginPath();rr(pu.x-s,pu.y-s,s*2,s*2,6);ctx.fillStyle=pu.color+'30';ctx.fill();
        ctx.strokeStyle=pu.color;ctx.lineWidth=2;ctx.shadowColor=pu.color;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
        ctx.font=s*1.3+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pu.emoji,pu.x,pu.y);
        ctx.font='6px Orbitron,monospace';ctx.fillStyle=pu.color;ctx.textBaseline='top';ctx.fillText(pu.label,pu.x,pu.y+s+2);
      });
    }

      if(paused){
        const overResume=cx>pauseResumeBtnRect.x&&cx<pauseResumeBtnRect.x+pauseResumeBtnRect.w&&cy>pauseResumeBtnRect.y&&cy<pauseResumeBtnRect.y+pauseResumeBtnRect.h;
        const overMenu=cx>pauseMenuBtnRect.x&&cx<pauseMenuBtnRect.x+pauseMenuBtnRect.w&&cy>pauseMenuBtnRect.y&&cy<pauseMenuBtnRect.y+pauseMenuBtnRect.h;
        pauseHover=overResume?'resume':overMenu?'menu':null;canvas.style.cursor=(overResume||overMenu)?'pointer':'default';return;
      }
      pauseHover=null;canvas.style.cursor='default';
      if(mode==='multi')return;
      if(!running&&countdown===0)return;
      const mouseX=(e.clientX-rect.left)*(W/rect.width);
      if(mode==='breakout'){lp.x=Math.max(0,Math.min(W-lp.w,mouseX-lp.w/2));}
      else if(mode==='online'){onlineMyPad.ax=Math.max(ZONE,Math.min(W-ZONE,mouseX));onlineSend({t:'p',ax:onlineMyPad.ax});}
      else if(mode==='ai'){if(!rp.frozen)rp.ax=Math.max(ZONE,Math.min(W-ZONE,mouseX));}
    });

    canvas.addEventListener('click',e=>{
      const ov=document.getElementById('overlay');if(!ov.classList.contains('hidden'))return;if(!paused)return;
      const rect=canvas.getBoundingClientRect();
      const cx=(e.clientX-rect.left)*(W/rect.width),cy=(e.clientY-rect.top)*(H/rect.height);
      if(cx>pauseResumeBtnRect.x&&cx<pauseResumeBtnRect.x+pauseResumeBtnRect.w&&cy>pauseResumeBtnRect.y&&cy<pauseResumeBtnRect.y+pauseResumeBtnRect.h)togglePause();
      if(cx>pauseMenuBtnRect.x&&cx<pauseMenuBtnRect.x+pauseMenuBtnRect.w&&cy>pauseMenuBtnRect.y&&cy<pauseMenuBtnRect.y+pauseMenuBtnRect.h)showMenu();
    });

    canvas.addEventListener('touchmove',e=>{
      const ov=document.getElementById('overlay');if(!ov.classList.contains('hidden')){return;}
      e.preventDefault();const rect=canvas.getBoundingClientRect();
      for(const t of e.changedTouches){
        const tx=(t.clientX-rect.left)*(W/rect.width),ty=(t.clientY-rect.top)*(H/rect.height);
        if(mode==='breakout'){if(!lp.frozen)lp.x=Math.max(0,Math.min(W-lp.w,tx-lp.w/2));}
        else if(mode==='online'){onlineMyPad.ax=Math.max(ZONE,Math.min(W-ZONE,tx));onlineSend({t:'p',ax:onlineMyPad.ax});}
        else if(mode==='ai'){if(!rp.frozen)rp.ax=Math.max(ZONE,Math.min(W-ZONE,tx));}
      }
    },{passive:false});
    canvas.addEventListener('touchend',e=>{},{passive:false});

    initPads();initBall();loop();
  </script>
</body>
</html>
